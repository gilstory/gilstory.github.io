<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>길스토리 페이지</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a2744 0%, #2d56b8 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #fffef9;
      border-radius: 20px;
      padding: 50px 60px;
      text-align: center;
      box-shadow: 0 8px 40px rgba(0,0,0,0.2);
      max-width: 500px;
    }
    .emoji { font-size: 60px; margin-bottom: 20px; }
    h1 { color: #1a2744; font-size: 28px; margin-bottom: 12px; }
    p { color: #555; font-size: 16px; line-height: 1.7; }
    .badge {
      display: inline-block;
      margin-top: 24px;
      background: #e8a020;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🎉</div>
    <h1>GitHub Pages 연결 성공!</h1>
    <p>Claude가 자동으로 업로드한 첫 번째 페이지입니다.<br>이제 HTML 파일을 자동으로 공유할 수 있어요!</p>
    <div class="badge">✅ gilstory.github.io 활성화 완료</div>
  </div>
</body>
</html>
