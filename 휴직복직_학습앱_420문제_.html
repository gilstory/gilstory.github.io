<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>휴직과 복직 — 틀린 부분 찾기 학습앱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap');

  :root {
    --navy: #1a2744;
    --navy-mid: #243462;
    --blue: #2d56b8;
    --blue-light: #4a7de0;
    --accent: #e8a020;
    --accent-light: #fdd475;
    --red: #d63031;
    --green: #00897b;
    --bg: #f4f1eb;
    --card: #fffef9;
    --border: #ddd8c8;
    --text: #1a1a2e;
    --muted: #666;
    --shadow: 0 4px 24px rgba(26,39,68,0.13);
    --shadow-lg: 0 8px 40px rgba(26,39,68,0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.7;
  }

  /* ── HEADER ── */
  .app-header {
    background: var(--navy);
    color: #fff;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }
  .header-icon { font-size: 28px; }
  .header-title { font-family: 'Noto Serif KR', serif; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; opacity: 0.65; margin-top: 1px; }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 10px; }
  .score-badge {
    background: var(--accent);
    color: var(--navy);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 700;
  }
  .reset-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
  }
  .reset-btn:hover { background: rgba(255,255,255,0.22); }

  /* ── LAYOUT ── */
  .app-body { display: flex; min-height: calc(100vh - 66px); }

  /* ── SIDEBAR TOGGLE BUTTON ── */
  .sidebar-toggle-btn {
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .sidebar-toggle-btn:hover { background: rgba(255,255,255,0.25); }

  /* ── SIDEBAR OVERLAY (mobile backdrop) ── */
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 199;
  }
  .sidebar-backdrop.visible { display: block; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--navy-mid);
    padding: 16px 0;
    overflow-y: auto;
    overflow-x: hidden;
    position: sticky;
    top: 66px;
    height: calc(100vh - 66px);
    transition: width 0.28s ease, min-width 0.28s ease, padding 0.28s ease, opacity 0.25s ease;
    flex-shrink: 0;
  }
  .sidebar.collapsed {
    width: 0;
    min-width: 0;
    padding: 0;
    opacity: 0;
    pointer-events: none;
  }

  /* Mobile: sidebar becomes a fixed overlay */
  @media (max-width: 700px) {
    .sidebar {
      position: fixed;
      top: 66px;
      left: 0;
      height: calc(100vh - 66px);
      z-index: 200;
      width: 260px;
      min-width: 260px;
      transform: translateX(-100%);
      transition: transform 0.28s ease, opacity 0.25s ease;
      opacity: 1;
    }
    .sidebar.open-mobile {
      transform: translateX(0);
      pointer-events: auto;
    }
    .sidebar.collapsed {
      width: 260px;
      min-width: 260px;
      padding: 16px 0;
      opacity: 1;
    }
  }
  .sidebar-label {
    color: rgba(255,255,255,0.45);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 8px 18px 4px;
  }
  .section-btn {
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    color: rgba(255,255,255,0.75);
    padding: 10px 18px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 8px;
    border-left: 3px solid transparent;
  }
  .section-btn:hover { background: rgba(255,255,255,0.07); color: #fff; }
  .section-btn.active {
    background: rgba(255,255,255,0.12);
    color: #fff;
    border-left-color: var(--accent);
    font-weight: 700;
  }
  .sec-progress {
    margin-left: auto;
    font-size: 11px;
    opacity: 0.6;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 1px 6px;
  }
  .sec-progress.done { background: rgba(0,137,123,0.4); opacity: 1; color: #7fffd4; }

  /* ── MAIN ── */
  .main { flex: 1; padding: 28px 32px 60px; max-width: 900px; }

  /* ── SECTION HEADER ── */
  .section-header {
    background: var(--navy);
    border-radius: 16px;
    padding: 24px 28px;
    color: #fff;
    margin-bottom: 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    box-shadow: var(--shadow);
  }
  .sec-num {
    background: var(--accent);
    color: var(--navy);
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900;
    font-family: 'Noto Serif KR', serif;
    flex-shrink: 0;
  }
  .sec-title-text { font-family: 'Noto Serif KR', serif; font-size: 22px; font-weight: 700; }
  .sec-meta { font-size: 13px; opacity: 0.6; margin-top: 3px; }
  .sec-stats { margin-left: auto; text-align: right; }
  .progress-ring { position: relative; width: 64px; height: 64px; }
  .progress-ring svg { transform: rotate(-90deg); }
  .progress-ring circle { fill: none; stroke-width: 5; }
  .ring-bg { stroke: rgba(255,255,255,0.15); }
  .ring-fill { stroke: var(--accent); stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .ring-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    font-size: 14px; font-weight: 700; color: #fff;
  }

  /* ── CONTROLS ── */
  .controls {
    display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;
  }
  .ctrl-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 18px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--text);
    font-weight: 500;
  }
  .ctrl-btn:hover { border-color: var(--blue); color: var(--blue); background: #eef3ff; }
  .ctrl-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .filter-label { font-size: 13px; color: var(--muted); margin-left: auto; }

  /* ── QUESTION CARD ── */
  .q-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px 30px;
    margin-bottom: 16px;
    box-shadow: 0 2px 12px rgba(26,39,68,0.07);
    transition: box-shadow 0.2s, border-color 0.2s;
    position: relative;
  }
  .q-card:hover { box-shadow: var(--shadow); }
  .q-card.answered-correct { border-color: var(--green); background: #f0faf8; }
  .q-card.answered-wrong { border-color: var(--red); background: #fff5f5; }
  .q-card.answered-skip { border-color: #aaa; background: #f8f8f8; }

  .q-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
  }
  .q-num-badge {
    background: var(--navy);
    color: #fff;
    border-radius: 8px;
    padding: 4px 12px;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .q-page { font-size: 12px; color: var(--muted); margin-left: auto; background: var(--bg); border-radius: 6px; padding: 3px 8px; }
  .q-status-icon { font-size: 20px; margin-left: 4px; }

  .q-body {
    font-size: 19px;
    line-height: 1.85;
    font-family: 'Noto Serif KR', serif;
    color: var(--text);
    margin-bottom: 20px;
    word-break: keep-all;
  }
  .q-body u {
    text-decoration: none;
  }

  /* ── ANSWER BUTTONS ── */
  .q-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  .ans-btn {
    border-radius: 10px;
    padding: 10px 22px;
    font-size: 15px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    border: 2px solid;
    transition: all 0.18s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-reveal {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
  }
  .btn-reveal:hover { background: var(--blue-light); border-color: var(--blue-light); }
  .btn-correct {
    background: #e8f8f5;
    color: var(--green);
    border-color: var(--green);
  }
  .btn-correct:hover { background: var(--green); color: #fff; }
  .btn-wrong {
    background: #fff0f0;
    color: var(--red);
    border-color: var(--red);
  }
  .btn-wrong:hover { background: var(--red); color: #fff; }
  .btn-skip {
    background: var(--bg);
    color: var(--muted);
    border-color: #ccc;
    font-weight: 400;
  }
  .btn-skip:hover { background: #e8e8e8; }
  .btn-reset-q {
    background: transparent;
    color: var(--muted);
    border-color: #ccc;
    font-size: 13px;
    padding: 8px 16px;
    margin-left: auto;
  }
  .btn-reset-q:hover { color: var(--text); border-color: #999; }

  /* ── ANSWER BOX ── */
  .answer-box {
    margin-top: 18px;
    border-radius: 12px;
    overflow: hidden;
    animation: slideDown 0.25s ease;
  }
  @keyframes slideDown {
    from { opacity:0; transform:translateY(-8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .answer-wrong-part {
    background: #fff0f0;
    border-left: 4px solid var(--red);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .answer-right-part {
    background: #e8f8f5;
    border-left: 4px solid var(--green);
    padding: 14px 18px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .ans-label { font-size: 12px; font-weight: 700; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
  .ans-wrong-text { color: var(--red); font-size: 17px; font-weight: 700; font-family: 'Noto Serif KR', serif; }
  .ans-right-text { color: var(--green); font-size: 17px; font-weight: 700; font-family: 'Noto Serif KR', serif; }
  .ans-arrow { font-size: 20px; color: var(--muted); }
  .explain-box {
    background: #f5f7ff;
    border-left: 4px solid var(--blue);
    padding: 14px 18px;
    font-size: 15px;
    color: var(--navy);
    line-height: 1.7;
  }
  .explain-label { font-size: 11px; font-weight: 700; color: var(--blue); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }

  /* ── SUMMARY CARD ── */
  .summary-bar {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 20px 24px;
    margin-bottom: 20px;
    display: flex; gap: 0; overflow: hidden;
    box-shadow: 0 2px 12px rgba(26,39,68,0.07);
  }
  .sum-item {
    flex: 1; text-align: center; padding: 8px;
    border-right: 1px solid var(--border);
  }
  .sum-item:last-child { border-right: none; }
  .sum-num { font-size: 28px; font-weight: 900; font-family: 'Noto Serif KR', serif; }
  .sum-lbl { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .col-total { color: var(--navy); }
  .col-correct { color: var(--green); }
  .col-wrong { color: var(--red); }
  .col-unseen { color: #aaa; }

  /* ── OVERVIEW ── */
  .overview {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
  }
  .overview h2 { font-family: 'Noto Serif KR', serif; font-size: 22px; margin-bottom: 4px; }
  .overview p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
  .section-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; }
  .sec-tile {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .sec-tile:hover { border-color: var(--blue); box-shadow: 0 2px 12px rgba(45,86,184,0.15); transform: translateY(-2px); }
  .sec-tile-num { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .sec-tile-name { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 10px; }
  .tile-bar { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
  .tile-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), #00bfa5); border-radius: 3px; transition: width 0.4s ease; }
  .tile-stat { font-size: 12px; color: var(--muted); margin-top: 6px; }
  .start-all-btn {
    margin-top: 24px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 32px;
    font-size: 16px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    display: block; width: 100%;
    letter-spacing: 0.3px;
  }
  .start-all-btn:hover { background: var(--blue); }

  /* ── NAV ARROWS ── */
  .q-nav { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
  .nav-btn {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 18px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.18s;
    color: var(--text);
  }
  .nav-btn:hover { border-color: var(--blue); color: var(--blue); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ── MODE SELECTOR ── */
  .mode-tabs { display: flex; gap: 0; background: var(--bg); border: 1.5px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
  .mode-tab {
    flex: 1; padding: 9px; text-align: center; font-size: 14px; font-family: inherit; font-weight: 500;
    border: none; cursor: pointer; background: transparent; color: var(--muted); transition: all 0.18s;
  }
  .mode-tab.active { background: var(--navy); color: #fff; font-weight: 700; }

  /* ── STUDY MODE (one at a time) ── */
  .study-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 20px;
    padding: 36px 36px 28px;
    box-shadow: var(--shadow-lg);
    margin-bottom: 20px;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .study-card:not([onclick=""]):hover {
    box-shadow: var(--shadow-lg), 0 0 0 3px var(--accent-light);
  }
  .study-q-body {
    font-size: 22px;
    line-height: 2;
    font-family: 'Noto Serif KR', serif;
    color: var(--text);
    margin-bottom: 28px;
    word-break: keep-all;
  }
  .study-q-body u {
    text-decoration: none;
  }

  .flip-hint { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 12px; }

  .study-reveal-btn {
    width: 100%;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 17px;
    font-family: inherit;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
    margin-bottom: 12px;
  }
  .study-reveal-btn:hover { background: var(--blue); }

  .study-actions { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 12px; }
  .study-actions .ans-btn { justify-content: center; flex: 1; }

  /* ── PROGRESS BAR ── */
  .global-progress {
    height: 4px;
    background: rgba(255,255,255,0.15);
    position: fixed;
    top: 66px;
    left: 0; right: 0;
    z-index: 99;
  }
  .global-progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
  }

  /* Responsive */
  @media (max-width: 700px) {
    .main { padding: 16px 14px 60px; }
    .q-body, .study-q-body { font-size: 17px; }
    .study-card { padding: 22px 18px; }
    .section-grid { grid-template-columns: repeat(2, 1fr); }
    .summary-bar { flex-wrap: wrap; }
    .sum-item { min-width: 40%; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════
// DATA — 420 questions across 14 sections (30 each)
// ══════════════════════════════════════════════
const SECTIONS = [
  {
    id: 1, title: "질병휴직", questions: [
      { id:"1-1", q:"질병휴직위원회는 위원장 포함 <u>5명</u> 이상으로 구성하되 1명 이상은 진단서를 기초로 판단할 수 있는 의료전문가를 포함하여야 하며, 전체 위원의 2분의 1 이상은 공무원이 아닌 사람으로 구성한다.", wrong:"5명", right:"3명", explain:"질병휴직위원회는 위원장 포함 3명 이상으로 구성하여야 한다.", page:"202p" },
      { id:"1-2", q:"질병휴직 신청 시 진단서는 전치 <u>1월</u> 이상의 국민건강보험 적용 병·의원 또는 한의원에서 발행하는 진단서를 첨부하여야 한다.", wrong:"1월", right:"2월", explain:"질병휴직 진단서는 전치 2월 이상의 진단서를 제출하여야 한다.", page:"204p" },
      { id:"1-3", q:"공무상 질병휴직의 올바른 사용 순서는 공무상병가(180일) → 일반병가(<u>90일</u>) → 법정연가 사용 → 공무상질병휴직 순이다.", wrong:"90일", right:"60일", explain:"일반병가는 60일이다. 공무상병가(180일) → 일반병가(60일) → 법정연가 → 공무상질병휴직 순이다.", page:"205p" },
      { id:"1-4", q:"질병휴직 기간은 1년 이내이며, 부득이한 경우 <u>2년</u>의 범위에서 연장할 수 있다. 단, 동일 질병으로 총 2년(공무상 질병은 총 5년)을 초과할 수 없다.", wrong:"2년의 범위에서 연장", right:"1년의 범위에서 연장", explain:"질병휴직은 부득이한 경우 1년의 범위에서 연장 가능하며 총 2년을 초과할 수 없다.", page:"203p" },
      { id:"1-5", q:"일반 질병휴직 기간 중 봉급은 1년 이하인 경우 봉급액의 <u>60퍼센트</u>를 지급하고, 1년 초과 2년 이하인 경우에는 봉급액의 50퍼센트를 지급한다.", wrong:"60퍼센트", right:"70퍼센트", explain:"일반 질병휴직 시 봉급은 1년 이하인 경우 봉급액의 70퍼센트를 지급한다.", page:"207p" },
      { id:"1-6", q:"공무상 질병휴직의 경우 봉급은 <u>봉급액의 70퍼센트</u>를 지급하며, 시간외근무수당을 제외하고 모든 수당을 전액 지급한다.", wrong:"봉급액의 70퍼센트", right:"봉급액 전액(100퍼센트)", explain:"공무상 질병휴직의 경우 봉급은 전액 지급한다.", page:"207p" },
      { id:"1-7", q:"질병휴직 시 경력평정은 미산입(공무상 질병은 산입)되며, 일반 질병휴직의 호봉승급도 <u>승급 인정</u>된다.", wrong:"승급 인정", right:"승급 제한", explain:"일반 질병휴직은 호봉승급이 제한되며, 공무상 질병휴직만 승급이 인정된다.", page:"207p" },
      { id:"1-8", q:"질병휴직 결원보충은 <u>3월</u> 이상 휴직한 경우에 결원보충이 가능하다.", wrong:"3월", right:"6월", explain:"질병휴직 결원보충은 6월 이상 휴직한 경우에 가능하다.", page:"207p" },
      { id:"1-9", q:"공무상 질병휴직자에게 같은 사유로 휴직기간 연장을 명하려는 경우로 총 휴직기간이 <u>5년</u>을 초과하는 경우에는 질병휴직위원회에 자문해야 한다.", wrong:"5년", right:"3년", explain:"공무상 질병휴직 연장 시 총 휴직기간이 3년을 초과하는 경우 질병휴직위원회에 자문해야 한다.", page:"206p" },
      { id:"1-10", q:"질병휴직 기간이 만료된 후에도 직무를 정상적으로 감당할 수 없을 경우 직권면직 처분을 할 수 있으며, 그 처분에 불복이 있는 교육공무원은 설명서를 받은 날부터 <u>60일</u> 이내에 교원소청심사위원회에 재심을 청구할 수 있다.", wrong:"60일", right:"30일", explain:"교원소청심사위원회에 재심을 청구할 수 있는 기간은 설명서를 받은 날부터 30일 이내이다.", page:"208p" },
      { id:"1-11", q:"공무상 질병휴직의 경력평정은 <u>미산입</u>되며, 호봉승급기간에도 포함되지 않는다.", wrong:"미산입", right:"100퍼센트 산입(호봉승급기간에도 포함)", explain:"공무상 질병휴직은 경력평정 100퍼센트 산입되며, 호봉승급기간에도 포함된다.", page:"207p" },
      { id:"1-12", q:"공무상 질병 발생 시 병가는 공무상병가 <u>60일</u>과 일반병가 60일을 합산하여 사용한다.", wrong:"60일", right:"180일", explain:"공무상병가는 180일이며, 이후 일반병가 60일, 법정연가, 공무상질병휴직 순으로 사용한다.", page:"205p" },
      { id:"1-13", q:"일반 질병휴직 중 정근수당 지급 시 1년 이하 구간에는 수당액의 <u>6분의 1</u>을 감액하지 않고 전액 지급한다.", wrong:"6분의 1을 감액하지 않고 전액 지급", right:"1월당 수당액의 6분의 1을 감액", explain:"일반 질병휴직 기간 중 정근수당은 휴직 1월당 수당액의 6분의 1씩 감액한다.", page:"207p" },
      { id:"1-14", q:"질병휴직 기간 중 취득한 학위 또는 자격증은 <u>호봉획정에 인정</u>된다.", wrong:"호봉획정에 인정", right:"인정되지 않음", explain:"질병휴직 기간 중 취득한 학위나 자격증은 호봉획정에 반영되지 않는다.", page:"208p" },
      { id:"1-15", q:"일반 질병휴직의 법정휴직기간은 <u>2년</u> 이내로, 부득이한 경우에도 이를 초과할 수 없다.", wrong:"2년", right:"1년", explain:"일반 질병휴직은 1년 이내이며, 부득이한 경우 1년 연장하여 최대 2년이다.", page:"203p" },
      { id:"1-16", q:"공무상 질병휴직은 <u>본인의 신청</u>이 있어야만 발령할 수 있으며, 직권으로 명할 수 없다.", wrong:"본인의 신청이 있어야만", right:"직권으로도 명할 수 있음", explain:"공무상 질병휴직은 직권 또는 본인의 신청에 의하여 명할 수 있다.", page:"203p" },
      { id:"1-17", q:"질병휴직 복직 시에는 복직원과 <u>진단서(완치 확인)</u>를 제출하는 것으로 충분하다.", wrong:"진단서(완치 확인)", right:"직무 수행 가능 소견이 기재된 진단서", explain:"복직 시 제출하는 진단서에는 현재 직무를 수행할 수 있다는 의사의 소견이 반드시 포함되어야 한다.", page:"208p" },
      { id:"1-18", q:"공무상 질병휴직의 최대 총 기간은 연장을 포함하여 <u>3년</u>이다.", wrong:"3년", right:"5년", explain:"공무상 질병휴직은 3년 이내이며, 의학적 소견 등에 따라 2년 연장 가능하여 최대 5년이다.", page:"203p" },
      { id:"1-19", q:"질병휴직 기간 중 기소되어 구금된 경우에는 <u>당연히 복직</u>된다.", wrong:"당연히 복직", right:"직위해제 가능", explain:"질병휴직 기간 중 기소된 경우에는 국가공무원법에 의한 직위해제 처분이 가능하다.", page:"208p" },
      { id:"1-20", q:"질병휴직을 신청하는 교원은 반드시 <u>대학병원 이상</u>의 의료기관에서 발급한 진단서를 제출해야 한다.", wrong:"대학병원 이상", right:"국민건강보험 적용 병·의원 또는 한의원", explain:"질병휴직 진단서는 국민건강보험이 적용되는 병·의원 또는 한의원에서 발급한 진단서이면 된다.", page:"204p" },
      { id:"1-21", q:"동일한 질병으로 재발하여 다시 질병휴직을 허가하려면 이전 복직 후 반드시 <u>1년</u>이 경과해야 한다.", wrong:"1년이 경과해야 한다", right:"정상적인 상태로 상당기간 근무했음이 인정되어야 함", explain:"동일 질병으로 재발 시 이전 복직 후 상당기간 정상적으로 근무했음이 인정되면 새로운 질병휴직 부여 가능하며, 반드시 1년 경과 요건은 없다.", page:"208p" },
      { id:"1-22", q:"공무상 질병휴직 발령 기준일은 <u>휴직원을 제출한 날</u>이다.", wrong:"휴직원을 제출한 날", right:"공무상 부상·질병이 발생한 날(소급 발령 가능)", explain:"공무상 질병휴직은 공무상 부상·질병이 발생한 날로 소급하여 발령할 수 있다.", page:"203p" },
      { id:"1-23", q:"병가 일수 기준으로 일반병가 <u>90일</u>을 모두 사용해야 질병휴직 신청이 가능하다.", wrong:"90일", right:"60일", explain:"일반병가는 연간 60일 이내이며, 이를 모두 소진한 후 질병휴직 신청이 가능하다.", page:"205p" },
      { id:"1-24", q:"공무상 질병휴직 중인 교원은 시간외근무수당을 포함하여 <u>모든 수당을 전액</u> 지급받는다.", wrong:"시간외근무수당을 포함하여 모든 수당을 전액", right:"시간외근무수당은 지급하지 않고 나머지 수당은 전액 지급", explain:"공무상 질병휴직 중에는 시간외근무수당은 지급하지 않고, 그 외 수당은 전액 지급한다.", page:"207p" },
      { id:"1-25", q:"질병휴직자가 허가된 요양지를 이탈하는 경우 <u>즉시 면직</u> 처분을 해야 한다.", wrong:"즉시 면직", right:"복직 명령 후 징계 처분 가능", explain:"요양지 이탈은 복무규정 위반이므로 복직을 명한 후 징계 절차를 밟을 수 있다.", page:"208p" },
      { id:"1-26", q:"질병휴직위원회의 심의 결과는 <u>반드시 임용권자를 구속</u>하며, 심의 결과대로 처리해야 한다.", wrong:"반드시 임용권자를 구속", right:"자문으로서 임용권자를 구속하지 않음", explain:"질병휴직위원회는 자문기구이므로 그 심의 결과가 임용권자를 구속하지 않는다.", page:"202p" },
      { id:"1-27", q:"일반 질병휴직 기간 중 1년 초과~2년 이하 구간의 봉급 지급률은 <u>60퍼센트</u>이다.", wrong:"60퍼센트", right:"50퍼센트", explain:"1년 초과 2년 이하 구간의 일반 질병휴직 봉급 지급률은 50퍼센트이다.", page:"207p" },
      { id:"1-28", q:"일반 질병휴직 후 복직한 경우 정근수당은 <u>감액 없이 전액</u> 지급된다.", wrong:"감액 없이 전액", right:"휴직 1월당 수당액의 6분의 1씩 감액하여 지급", explain:"일반 질병휴직 후 복직 시 지급되는 정근수당은 휴직 1월당 6분의 1씩 감액한다.", page:"207p" },
      { id:"1-29", q:"질병휴직 기간 중에는 어떠한 이유로도 <u>결원 보충이 불가</u>하다.", wrong:"결원 보충이 불가", right:"6월 이상 휴직 시 결원 보충 가능", explain:"질병휴직이 6월 이상인 경우에는 결원 보충이 가능하다.", page:"207p" },
      { id:"1-30", q:"일반 질병휴직 중 경력평정은 <u>100퍼센트</u> 산입된다.", wrong:"100퍼센트", right:"미산입", explain:"일반 질병휴직 중 경력평정은 미산입된다(공무상 질병휴직은 100퍼센트 산입).", page:"207p" },
    ]
  },
  {
    id: 2, title: "병역휴직", questions: [
      { id:"2-1", q:"병역휴직 시 경력평정은 <u>미산입</u>되며, 호봉승급기간에도 포함되지 않는다.", wrong:"미산입", right:"산입(호봉승급기간에도 포함)", explain:"병역휴직 시 경력평정은 산입되며, 호봉승급기간에도 포함된다.", page:"213p" },
      { id:"2-2", q:"병역휴직 기간 중 봉급은 지급하지 않으나, <u>3년</u> 이상 근속한 공무원이 휴직할 경우 그 달의 봉급 전액을 지급한다.", wrong:"3년", right:"2년", explain:"2년 이상 근속한 공무원이 휴직할 경우 그 달의 봉급 전액을 지급한다.", page:"213p" },
      { id:"2-3", q:"병역휴직 결원보충은 <u>3월</u> 이상 휴직 시 별도정원에 의한 결원보충이 가능하다.", wrong:"3월", right:"6월", explain:"병역휴직 결원보충은 6월 이상 휴직 시 가능하다.", page:"213p" },
      { id:"2-4", q:"병역휴직 복직 후 정근수당 지급 시 휴직기간에 대하여 <u>별도의 감액을 한다</u>.", wrong:"별도의 감액을 한다", right:"별도의 감액을 하지 아니함", explain:"병역휴직의 경우 복직 후 정근수당 지급 시 휴직기간에 대해 별도 감액을 하지 않는다.", page:"213p" },
      { id:"2-5", q:"병역의무를 필하기 위한 휴직은 그 성격상 <u>2회</u>로 한정한다.", wrong:"2회", right:"1회", explain:"병역의무를 필하기 위한 휴직은 그 성격상 1회로 한정한다.", page:"213p" },
      { id:"2-6", q:"공무원이 병역의무를 필하기 위하여 단기복무 장교로 입대하는 경우에는 본인으로 하여금 사직원을 제출케 하여 <u>의원면직</u> 처리하여야 한다.", wrong:"의원면직", right:"휴직 조치", explain:"단기복무 장교로 병역의무를 이행하는 경우에는 휴직 조치해야 한다.", page:"215p" },
      { id:"2-7", q:"병역휴직 복직 시 필요한 서류는 복직원과 <u>입영(소집)통지서</u>이다.", wrong:"입영(소집)통지서", right:"전역증(병적증명서)", explain:"복직 시에는 복직원과 전역증(병적증명서)을 제출해야 한다.", page:"213p" },
      { id:"2-8", q:"귀가 처리된 병역휴직자에 대하여는 휴직사유가 소멸된 것으로 보아 <u>30일 이내</u>에 복직을 명하여야 한다.", wrong:"30일 이내", right:"지체 없이", explain:"귀가 처리된 자에 대하여는 지체 없이 복직을 명하여야 한다.", page:"214p" },
      { id:"2-9", q:"군복무를 위하여 휴직 중에 있는 자가 군복무 중 군무를 이탈하였을 때는 <u>당연 복직</u>된다.", wrong:"당연 복직", right:"직권 면직 가능", explain:"군복무 중 군무를 이탈하였을 때는 직권으로 면직시킬 수 있다.", page:"214p" },
      { id:"2-10", q:"군복무 중 장기군복무를 지원하였을 때에는 <u>복직</u>조치하여야 한다.", wrong:"복직", right:"면직", explain:"장기군복무를 지원하였을 때에는 면직조치하여야 한다.", page:"214p" },
      { id:"2-11", q:"병역휴직의 법정 휴직기간은 <u>최대 3년</u>으로 고정되어 있다.", wrong:"최대 3년으로 고정", right:"의무복무기간이 만료될 때까지", explain:"병역휴직의 법정 기간은 의무복무기간이 만료될 때까지이므로, 의무복무기간에 따라 달라진다.", page:"213p" },
      { id:"2-12", q:"군장학생으로 선발되어 장학금을 3년간 지급받은 후 단기복무장교(기본 의무복무 3년)로 임관할 경우, 의무복무기간은 기본 3년만 적용된다.", wrong:"기본 3년만 적용", right:"장학금 이수 기간 3년이 가산되어 총 6년", explain:"군장학생은 기본 의무복무기간에 장학금 지급기간이 가산되어 총 의무복무기간이 산정된다.", page:"212p" },
      { id:"2-13", q:"병역휴직 중 현역으로 복무하는 교원에 대한 징계는 <u>불가능</u>하다.", wrong:"불가능", right:"가능(국가공무원법 적용)", explain:"병역휴직 중에도 교육공무원 신분은 유지되므로 국가공무원법에 의한 징계가 가능하다.", page:"213p" },
      { id:"2-14", q:"병역휴직 중인 교원이 자원하여 현역 복무를 중단하고 귀가 처리된 경우, 이는 휴직사유 <u>유지</u>에 해당한다.", wrong:"유지", right:"소멸", explain:"자원하여 귀가 처리된 경우에도 휴직사유가 소멸되어 복직을 명해야 한다.", page:"214p" },
      { id:"2-15", q:"현역으로 복무 중 탈영한 후 자수하여 잔여복무기간을 마친 경우, 탈영 이전 기간과 합산하여 <u>정상적으로 복직</u>된다.", wrong:"정상적으로 복직", right:"복직 불가(휴직처분 효력 상실)", explain:"탈영으로 휴직사유가 소멸되었으므로 이후 잔여복무를 마쳐도 복직이 불가하다.", page:"214p" },
      { id:"2-16", q:"병역휴직의 발령기준일은 <u>입영(소집)통지서 수령일</u>이다.", wrong:"입영(소집)통지서 수령일", right:"입영(소집)일", explain:"병역휴직 발령기준일은 실제 입영(소집)한 날이다.", page:"213p" },
      { id:"2-17", q:"병역휴직 기간 중에는 어떠한 경우에도 <u>결원 보충이 불가</u>하다.", wrong:"결원 보충이 불가", right:"6월 이상이면 결원 보충 가능", explain:"병역휴직이 6월 이상인 경우에는 결원 보충이 가능하다.", page:"213p" },
      { id:"2-18", q:"병역휴직자가 전역 후 복직 신고를 <u>60일</u> 이내에 해야 당연복직이 된다.", wrong:"60일", right:"30일", explain:"휴직기간 만료 후 30일 이내에 복직 신고를 해야 당연복직이 된다.", page:"214p" },
      { id:"2-19", q:"병역휴직 중 근속 2년 미만인 경우 휴직한 달의 봉급은 <u>전액</u> 지급된다.", wrong:"전액", right:"일할계산하여 지급", explain:"2년 미만 근속자는 그 달 봉급을 일할계산하여 지급한다(2년 이상 근속자는 전액 지급).", page:"213p" },
      { id:"2-20", q:"예비군 훈련 참가를 위한 소집은 병역휴직 사유로 <u>인정</u>된다.", wrong:"인정", right:"인정되지 않음", explain:"예비군 훈련은 단기 소집이므로 병역휴직이 아닌 병가 또는 공가 처리 사항이다.", page:"212p" },
      { id:"2-21", q:"병역휴직자가 재입영하는 경우에는 <u>새로운 임용절차</u>를 거쳐야 한다.", wrong:"새로운 임용절차", right:"재휴직 조치", explain:"재입영하는 경우에는 재휴직 조치를 하면 된다.", page:"213p" },
      { id:"2-22", q:"「병역법」에 의한 사회복무요원으로 복무하게 된 경우에는 <u>병역휴직</u>이 아닌 법정의무수행휴직을 사용한다.", wrong:"병역휴직", right:"병역휴직 또는 법정의무수행휴직 중 선택 가능", explain:"사회복무요원은 「병역법」에 의한 의무복무이므로 병역휴직 사유에 해당한다.", page:"212p" },
      { id:"2-23", q:"병역휴직 기간 중 정근수당가산금은 <u>전액 지급</u>된다.", wrong:"전액 지급", right:"지급하지 않음(2년 이상 근속자는 휴직한 달 전액)", explain:"병역휴직 기간 중에는 봉급 관련 수당은 지급하지 않으며, 2년 이상 근속자는 휴직한 달만 전액 지급된다.", page:"213p" },
      { id:"2-24", q:"병역휴직 중 군 복무를 성실히 이행하면 <u>복직 후 정근수당이 가산</u>된다.", wrong:"복직 후 정근수당이 가산", right:"복직 후 정근수당 감액 없음", explain:"병역휴직은 복직 후 정근수당 별도 감액이 없으며, 가산 규정도 없다.", page:"213p" },
      { id:"2-25", q:"병역휴직의 기산일은 군복무가 시작된 날이 아닌 <u>임용권자가 휴직을 명한 날</u>이다.", wrong:"임용권자가 휴직을 명한 날", right:"입영(소집)일", explain:"병역휴직 발령기준일은 실제 입영(소집)한 날이다.", page:"213p" },
      { id:"2-26", q:"병역휴직 기간 중 경력평정 100퍼센트 산입으로 인해 <u>호봉이 자동으로 1호봉 상승</u>한다.", wrong:"호봉이 자동으로 1호봉 상승", right:"경력 100퍼센트 산입 및 호봉승급기간 포함되나 자동 호봉 상승은 별도 획정에 따름", explain:"경력 및 호봉승급기간 산입은 100퍼센트이나, 실제 호봉 변동은 별도의 획정 절차에 따른다.", page:"213p" },
      { id:"2-27", q:"현역으로 입대한 경우와 사회복무요원으로 복무하는 경우 모두 동일하게 <u>법정의무수행휴직</u>을 사용한다.", wrong:"법정의무수행휴직", right:"현역입대는 병역휴직, 사회복무요원은 법정의무수행휴직", explain:"현역 입대는 병역휴직, 사회복무요원 복무는 법정의무수행휴직을 사용하는 것이 원칙이다.", page:"212p" },
      { id:"2-28", q:"병역휴직 기간 중 명절휴가비는 <u>지급기준일에 지급</u>된다.", wrong:"지급기준일에 지급", right:"지급하지 않음", explain:"병역휴직 기간 중에는 명절휴가비를 지급하지 않는다.", page:"213p" },
      { id:"2-29", q:"병역휴직을 마치고 복직하는 교원은 반드시 <u>직무연수 30시간</u>을 이수한 후 복직해야 한다.", wrong:"직무연수 30시간을 이수한 후", right:"복직 시 직무연수 의무 없음", explain:"병역휴직 복직 시에는 직무연수 의무가 없다(2년 이상 육아·동반휴직 복직자에게 적용되는 규정).", page:"213p" },
      { id:"2-30", q:"병역휴직 기간의 호봉승급 경력인정은 상근 여부에 따라 <u>50퍼센트 또는 100퍼센트</u>로 구분된다.", wrong:"50퍼센트 또는 100퍼센트로 구분", right:"100퍼센트(구분 없이 전부 인정)", explain:"병역휴직은 상근·비상근 구분 없이 호봉승급기간을 100퍼센트 인정한다.", page:"213p" },
    ]
  },
  {
    id: 3, title: "행방불명휴직", questions: [
      { id:"3-1", q:"행방불명휴직의 휴직기간은 <u>6월</u> 이내이다.", wrong:"6월", right:"3월", explain:"행방불명휴직의 기간은 3월 이내이다.", page:"216p" },
      { id:"3-2", q:"행방불명휴직 시 경력평정은 <u>산입</u>되며, 호봉승급기간에도 포함된다.", wrong:"산입", right:"미산입(호봉승급기간에서 제외)", explain:"행방불명휴직 시 경력평정은 미산입되며, 호봉승급기간에서도 제외된다.", page:"218p" },
      { id:"3-3", q:"행방불명휴직의 경우 <u>6월</u> 이상 휴직 시 결원보충이 가능하다.", wrong:"6월 이상 시 결원보충 가능", right:"결원보충 불가", explain:"행방불명휴직의 경우 결원보충이 불가하다.", page:"218p" },
      { id:"3-4", q:"행방불명휴직 처리 후 <u>6월</u> 이내에 본인이 복귀신고를 할 경우 지체 없이 복직을 명하여야 한다.", wrong:"6월", right:"3월", explain:"3월 이내에 본인이 복귀신고를 할 경우 지체 없이 복직을 명하여야 한다.", page:"217p" },
      { id:"3-5", q:"행방불명휴직 기간이 만료된 후에도 복귀를 하지 아니할 경우에는 <u>당연복직</u> 처리한다.", wrong:"당연복직", right:"직권면직 가능", explain:"휴직기간 만료 후에도 복귀하지 아니할 경우에는 직권으로 면직시킬 수 있다.", page:"217p" },
      { id:"3-6", q:"행방불명휴직의 발령기준일은 <u>복직원을 받은 날</u>로 한다.", wrong:"복직원을 받은 날", right:"인지 또는 실종신고일", explain:"행방불명휴직의 발령기준일은 생사·소재가 불명한 것을 인지하였을 때 또는 실종신고가 된 것을 안 날이다.", page:"216p" },
      { id:"3-7", q:"교육공무원 스스로 잠적하는 등 내부적인 요인은 행방불명휴직 사유에 <u>해당되지 않는다</u>.", wrong:"해당되지 않는다", right:"해당된다", explain:"공무원 스스로 잠적하는 등 내부적인 요인에 의한 것까지 행방불명휴직 사유에 포함한다.", page:"217p" },
      { id:"3-8", q:"행방불명휴직 기간 중 봉급은 지급하지 않으며, 휴직한 날이 속하는 달의 봉급도 <u>일할계산 없이 전액 지급하지 않는다</u>.", wrong:"일할계산 없이 전액 지급하지 않는다", right:"일할계산하여 지급한다", explain:"휴직한 날이 속하는 달의 봉급은 일할계산하여 지급한다.", page:"218p" },
      { id:"3-9", q:"행방불명휴직의 횟수는 <u>1회</u>로 한정한다.", wrong:"1회", right:"제한 없음", explain:"행방불명휴직의 횟수에는 제한이 없다.", page:"216p" },
      { id:"3-10", q:"행방불명휴직 시 휴직원은 <u>반드시 본인이 제출</u>하여야 한다.", wrong:"반드시 본인이 제출", right:"휴직신청서 없이 직권으로 휴직을 명함", explain:"행방불명휴직은 직권휴직으로 휴직신청서(휴직원) 없이 직권으로 명한다.", page:"217p" },
      { id:"3-11", q:"행방불명휴직은 <u>본인의 신청</u>에 의해서만 발령할 수 있다.", wrong:"본인의 신청", right:"직권(임용권자 직권 처분)", explain:"행방불명휴직은 임용권자가 직권으로 명하는 직권휴직이다.", page:"217p" },
      { id:"3-12", q:"행방불명휴직 기간이 만료된 후 복귀신고를 한 경우, 복귀신고를 한 날부터 <u>30일</u> 내에 복직 처리해야 한다.", wrong:"30일 내에 복직", right:"지체 없이 복직", explain:"복귀신고가 있으면 임용권자는 지체 없이 복직을 명해야 한다.", page:"217p" },
      { id:"3-13", q:"행방불명휴직 중인 교원에 대한 결원은 <u>6월이 경과하면 결원 보충이 가능</u>하다.", wrong:"6월이 경과하면 결원 보충이 가능", right:"결원 보충 불가", explain:"행방불명휴직은 결원 보충이 불가하다.", page:"218p" },
      { id:"3-14", q:"행방불명휴직 기간 만료 후에도 복귀하지 않는 경우 임용권자는 반드시 <u>30일</u>을 추가로 기다린 후 직권면직 처분을 해야 한다.", wrong:"30일을 추가로 기다린", right:"만료 즉시 직권면직 가능", explain:"행방불명휴직 기간 만료 후에는 추가 대기 없이 바로 직권면직 처분이 가능하다.", page:"217p" },
      { id:"3-15", q:"행방불명휴직의 발령기준일에 인지일과 실종신고일이 다를 경우 <u>실종신고일</u>을 기준으로 한다.", wrong:"실종신고일", right:"인지일과 실종신고일 중 먼저 도래한 날", explain:"두 날짜 중 먼저 도래한 날을 발령기준일로 한다.", page:"216p" },
      { id:"3-16", q:"행방불명휴직 중인 교원이 복귀했을 때 호봉은 <u>휴직 기간을 전부 인정</u>하여 재산정한다.", wrong:"휴직 기간을 전부 인정", right:"호봉승급기간에서 제외되므로 인정 불가", explain:"행방불명휴직은 호봉승급기간에서 제외되어 해당 기간은 호봉산정에 포함되지 않는다.", page:"218p" },
      { id:"3-17", q:"행방불명휴직은 무단결근이 발생한 경우에는 발령이 <u>불가</u>하다.", wrong:"불가", right:"가능(무단결근 중에도 발령 가능)", explain:"무단결근 상태에서도 행방불명휴직 발령이 가능하다.", page:"217p" },
      { id:"3-18", q:"행방불명휴직 기간 중에도 상훈법에 따른 표창은 <u>정상적으로 수여</u>될 수 있다.", wrong:"정상적으로 수여", right:"행방불명 상태이므로 수여 불가", explain:"행방불명 상태에서는 사실상 표창 수여가 불가능하다.", page:"218p" },
      { id:"3-19", q:"행방불명휴직 처리 이전에 반드시 <u>경찰에 실종 신고</u>를 해야 한다.", wrong:"반드시 경찰에 실종 신고", right:"인지만 되어도 발령 가능(실종신고가 없어도)", explain:"실종신고 없이 인지만으로도 발령기준일이 될 수 있으므로 반드시 실종신고가 선행될 필요는 없다.", page:"216p" },
      { id:"3-20", q:"행방불명휴직 기간 중 퇴직수당의 경우 해당 기간을 <u>100퍼센트 산입</u>한다.", wrong:"100퍼센트 산입", right:"미산입(경력평정에서 제외)", explain:"행방불명휴직은 경력평정에 미산입되므로 퇴직수당 산정에도 영향을 받는다.", page:"218p" },
      { id:"3-21", q:"행방불명휴직 기간이 만료되면 <u>당연퇴직</u>된다.", wrong:"당연퇴직", right:"직권면직 처분 가능", explain:"만료 후에도 복귀하지 않으면 직권면직 처분이 가능하며, 자동 퇴직은 아니다.", page:"217p" },
      { id:"3-22", q:"공무원이 출장 중 사고로 행방불명된 경우는 <u>공무상 질병휴직</u>으로 처리해야 한다.", wrong:"공무상 질병휴직", right:"행방불명휴직", explain:"공무 중 사고로 행방불명된 경우에도 소재 불명이므로 행방불명휴직을 명해야 한다.", page:"216p" },
      { id:"3-23", q:"행방불명휴직 기간 중 발생한 징계 사유에 대하여는 <u>징계 처분이 불가</u>하다.", wrong:"징계 처분이 불가", right:"징계 처분 가능", explain:"행방불명휴직 중에도 공무원 신분이 유지되므로 징계 사유 발생 시 징계 처분이 가능하다.", page:"218p" },
      { id:"3-24", q:"공무원이 잠적하여 소재불명된 경우 잠적 행위 자체는 <u>행방불명휴직 사유에 해당하지 않는다</u>.", wrong:"행방불명휴직 사유에 해당하지 않는다", right:"행방불명휴직 사유에 해당하며 동시에 징계 사유가 됨", explain:"잠적은 행방불명휴직 사유에 해당하며, 동시에 국가공무원법 제58조 위반의 징계 사유가 된다.", page:"217p" },
      { id:"3-25", q:"행방불명휴직의 최대 기간은 연장을 포함하여 <u>6월</u>이다.", wrong:"6월", right:"3월(연장 불가)", explain:"행방불명휴직은 3월 이내로, 연장 규정이 없다.", page:"216p" },
      { id:"3-26", q:"행방불명휴직 기간 중에는 명절휴가비가 <u>50퍼센트</u> 감액 지급된다.", wrong:"50퍼센트 감액 지급", right:"지급하지 않음", explain:"행방불명휴직 기간 중에는 명절휴가비를 지급하지 않는다.", page:"218p" },
      { id:"3-27", q:"행방불명휴직 후 복귀한 교원이 복직 신고를 하지 않으면 <u>자동으로 면직</u>된다.", wrong:"자동으로 면직", right:"임용권자가 별도 처분을 해야 면직됨", explain:"자동 면직은 없으며, 임용권자가 국가공무원법에 따라 면직 처분을 해야 한다.", page:"217p" },
      { id:"3-28", q:"행방불명휴직 기간은 연금법상 재직기간에 <u>포함</u>된다.", wrong:"포함", right:"포함되지 않음(경력평정 미산입)", explain:"행방불명휴직은 경력평정 미산입으로, 연금법상 재직기간 산정에서도 제외된다.", page:"218p" },
      { id:"3-29", q:"행방불명된 교원의 가족이 대신 복직 신청을 한 경우 <u>임용권자는 이를 수리해야 한다</u>.", wrong:"임용권자는 이를 수리해야 한다", right:"본인만 복직 신고 가능", explain:"복귀신고는 본인이 직접 해야 하며, 가족 대리 신고로는 복직 처리할 수 없다.", page:"217p" },
      { id:"3-30", q:"행방불명휴직 기간 중에도 승진심사 대상에 <u>포함</u>된다.", wrong:"포함", right:"경력평정 미산입으로 승진심사 대상에서 불리하게 처리됨", explain:"행방불명휴직은 경력평정 미산입으로 승진 경력이 인정되지 않아 실질적으로 불리하다.", page:"218p" },
    ]

      { id:"6-5", q:"외국의 <u>사기업체</u>에 임시로 고용된 경우에도 고용휴직이 가능하다.", wrong:"사기업체에 임시 고용 가능", right:"외국의 사기업체는 고용휴직 대상 해당 안 됨", explain:"외국기관의 범주에는 외국의 정부기관·공공단체는 포함되나 외국의 사기업체는 포함되지 않는다.", page:"237p" },
      { id:"6-6", q:"고용휴직 중 고용기관의 사정으로 주당 수업시수가 5시간 이하로 <u>3개월</u> 이상 계속될 경우 휴직사유가 소멸된 것으로 간주하여 복직하도록 한다.", wrong:"3개월", right:"6개월", explain:"주당 수업시수가 5시간 이하로 6개월 이상 계속될 경우 휴직사유가 소멸된 것으로 간주한다.", page:"236p" },
      { id:"6-7", q:"한국 정부의 승인을 얻지 않고 외국 정부의 승인만 얻은 <u>외국의 사립학교</u>도 재외교육기관에 해당하여 고용휴직이 가능하다.", wrong:"재외교육기관에 해당하여 고용휴직 가능", right:"재외교육기관에 해당하지 않아 고용휴직 불가", explain:"한국 정부의 승인을 얻지 않은 외국의 사립학교는 재외교육기관에 해당하지 않는다.", page:"238p" },
      { id:"6-8", q:"고용휴직한 공무원은 복직 시 고용기관에서 받은 보수내역 사본을 소속기관장에게 신고하여야 하며, <u>고용기관으로부터 퇴직금을 받을 수 있다</u>.", wrong:"퇴직금을 받을 수 있다", right:"퇴직금을 받을 수 없다", explain:"고용휴직한 공무원은 고용기관으로부터 퇴직금·퇴직수당 등을 받을 수 없다.", page:"239p" },
      { id:"6-9", q:"대학이나 연구기관에 대한 고용휴직은 강의나 학술·연구 목적뿐만 아니라 <u>감사, 기획, 인사 등 일반 지원부서</u>에서의 근무를 위한 휴직도 허용된다.", wrong:"일반 지원부서 근무도 허용", right:"일반 지원부서에서의 근무를 위한 휴직은 제외", explain:"대학·연구기관 고용휴직은 강의 및 연구·학술활동에 한하며 일반 지원부서는 제외된다.", page:"237p" },
      { id:"6-10", q:"고용휴직의 기간은 <u>최대 3년</u>이며, 고용기간을 초과하여 휴직하거나 연장할 수 없다.", wrong:"최대 3년", right:"고용기간(고용기간이 법정휴직기간)", explain:"고용휴직 기간은 고용기간이며, 고용기간을 초과하여 휴직하거나 연장할 수 없다.", page:"234p" },
      { id:"6-11", q:"고용휴직 중 무보수로 고용된 상태가 <u>6개월</u> 이상 지속되면 휴직사유 소멸로 복직해야 한다.", wrong:"6개월", right:"6개월 이상 계속 시 사유 소멸이 맞음(정확한 기준 적용)", explain:"무보수 6개월 이상 지속 시 사유 소멸로 간주하여 복직해야 한다.", page:"236p" },
      { id:"6-12", q:"고용휴직 기간 중 경력평정의 비상근 기준은 주당 수업시수 <u>3시간 이상</u>이다.", wrong:"3시간 이상", right:"6시간 이상 14시간 이하", explain:"비상근 기준은 주당 6시간 이상 14시간 이하이다.", page:"236p" },
      { id:"6-13", q:"고용휴직 중 고용기관에서 받은 보수 내역은 복직 후 <u>6개월 이내</u>에 소속기관 장에게 신고하여야 한다.", wrong:"6개월 이내", right:"복직 시 신고", explain:"복직 시에 보수 내역 사본을 제출하여야 한다.", page:"239p" },
      { id:"6-14", q:"고용휴직 중 해당 교원을 대신하는 기간제 교사는 고용휴직 기간이 <u>3월</u> 이상인 경우부터 채용 가능하다.", wrong:"3월", right:"6월", explain:"고용휴직 결원보충은 6월 이상 휴직 시 가능하다.", page:"236p" },
      { id:"6-15", q:"재외한국학교에 주당 5시간 고용되는 경우 고용휴직이 <u>가능</u>하다.", wrong:"가능", right:"불가(주당 5시간 이하는 불가)", explain:"주당 수업시수가 5시간 이하인 경우에는 고용휴직이 불가하다.", page:"234p" },
      { id:"6-16", q:"고용휴직 중 고용기간이 임의로 변경된 경우 이는 <u>인사상 문제 없이 허용</u>된다.", wrong:"인사상 문제 없이 허용", right:"고용기간 임의 변경은 징계 사유가 될 수 있음", explain:"고용기간 임의 변경은 허가 받은 조건의 변경이므로 징계 사유가 될 수 있다.", page:"239p" },
      { id:"6-17", q:"고용휴직 기간 중 비상근(주당 6~14시간)의 경우 호봉승급기간은 <u>100퍼센트</u> 인정된다.", wrong:"100퍼센트", right:"50퍼센트", explain:"비상근의 경우 경력평정과 호봉승급기간 모두 50퍼센트만 인정된다.", page:"236p" },
      { id:"6-18", q:"고용휴직 결원보충 가능 최소 기간은 <u>3월</u>이다.", wrong:"3월", right:"6월", explain:"고용휴직 결원보충은 6월 이상 휴직 시 가능하다.", page:"236p" },
      { id:"6-19", q:"고용휴직은 「교육공무원법」에 따라 국제기구 또는 외국 정부기관에 <u>채용된 경우에도</u> 불가하다.", wrong:"채용된 경우에도 불가", right:"가능", explain:"국제기구·외국 정부기관에 채용된 경우에는 고용휴직이 가능하다.", page:"234p" },
      { id:"6-20", q:"고용휴직 기간 중 주당 수업시수 5시간 이하가 <u>3개월</u>째 지속되고 있다면 즉시 복직을 명해야 한다.", wrong:"3개월째", right:"6개월 이상 계속될 때", explain:"6개월 이상 계속되어야 사유 소멸로 복직을 명할 수 있다.", page:"236p" },
      { id:"6-21", q:"재외한국학교에 주당 18시간 상근으로 고용된 경우 경력평정 산입률은 <u>50퍼센트</u>이다.", wrong:"50퍼센트", right:"100퍼센트", explain:"주당 15시간 이상(상근) 고용은 경력평정 100퍼센트 산입이다.", page:"236p" },
      { id:"6-22", q:"고용휴직 중 「국가공무원법」에 의한 징계는 <u>적용되지 않는다</u>.", wrong:"적용되지 않는다", right:"공무원 신분 유지로 징계 가능", explain:"고용휴직 중에도 교육공무원 신분이 유지되므로 징계가 가능하다.", page:"239p" },
      { id:"6-23", q:"고용휴직 기간 중 취득한 자격증은 <u>복직 후 즉시 호봉에 반영</u>된다.", wrong:"복직 후 즉시 호봉에 반영", right:"별도 획정 절차 필요", explain:"호봉 재획정은 별도의 신청과 확인 절차를 통해 이루어진다.", page:"239p" },
      { id:"6-24", q:"고용휴직 기간의 경력평정 산입률은 2000년 4월 1일 이전과 이후가 <u>동일하다</u>.", wrong:"동일하다", right:"다르다(1999.12.31. 이전 vs 2000.4.1. 이후 기준 다름)", explain:"2000년 4월 1일 이전과 이후의 경력 인정 기준이 다르므로 구분하여 적용해야 한다.", page:"236p" },
      { id:"6-25", q:"고용휴직 신청 시 반드시 <u>소속 교육청의 사전 허가</u>를 받아야 하며, 허가 없이 고용기관과 계약할 수 없다.", wrong:"소속 교육청의 사전 허가", right:"임용권자의 허가", explain:"임용권자(학교장 또는 교육청)의 허가가 필요하다.", page:"234p" },
      { id:"6-26", q:"고용휴직 기간 중 정근수당가산금은 <u>전액 지급</u>된다.", wrong:"전액 지급", right:"지급하지 않음", explain:"고용휴직 기간 중에는 봉급 및 관련 수당을 지급하지 않는다.", page:"236p" },
      { id:"6-27", q:"주당 수업시수가 <u>5시간</u>인 경우 비상근 기준에 해당하여 경력 50퍼센트가 인정된다.", wrong:"5시간", right:"5시간 이하는 인정 불가, 6시간 이상이어야 비상근 인정", explain:"주당 수업시수가 5시간 이하인 경우는 경력평정에 산입하지 않는다.", page:"236p" },
      { id:"6-28", q:"고용휴직 허가 신청 시 첨부 서류로 <u>가족관계증명서</u>가 필수적으로 요구된다.", wrong:"가족관계증명서", right:"고용계약서 또는 관련 증빙서류", explain:"고용휴직 신청 시에는 고용계약서 등 고용 사실을 증빙하는 서류가 필요하다.", page:"235p" },
      { id:"6-29", q:"재외한국학교에 고용된 교원이 동 기관에서 감사직을 맡은 경우 고용휴직이 <u>가능</u>하다.", wrong:"가능", right:"불가(감사직은 고용휴직 대상에서 제외)", explain:"대학·연구기관의 감사직은 고용휴직 허용 범위에서 제외되며, 재외한국학교도 동일한 원칙을 적용한다.", page:"237p" },
      { id:"6-30", q:"고용휴직의 법정 최대 기간은 <u>3년</u>이며, 이를 초과할 수 없다.", wrong:"3년", right:"고용기간(고용기간이 법정 기간이며, 3년이 상한이 아님)", explain:"고용휴직의 기간은 고용기간이 기준이다. 다만 1회 최대는 「교육공무원법」 규정에 따른다.", page:"234p" },
    ]
  },
  {
    id: 7, title: "육아휴직", questions: [
      { id:"7-1", q:"육아휴직 대상은 만 <u>9세</u> 이하 또는 초등학교 2학년 이하의 자녀를 양육하기 위한 남·여 교육공무원 및 임신 또는 출산한 여성 교육공무원이다.", wrong:"만 9세", right:"만 8세", explain:"육아휴직 대상은 만 8세 이하 또는 초등학교 2학년 이하의 자녀를 양육하기 위한 경우이다.", page:"241p" },
      { id:"7-2", q:"부부(교육)공무원의 경우 동일 자녀에 대하여 <u>동시에는 불가하고 순차적으로만</u> 육아휴직이 가능하다.", wrong:"동시에는 불가하고 순차적으로만", right:"동시 및 각각 순차적으로 모두 가능", explain:"부부(교육)공무원의 경우 동일자녀에 대하여 동시 및 각각 순차적으로 육아휴직이 가능하다.", page:"241p" },
      { id:"7-3", q:"육아휴직 시 호봉승급은 <u>모든 자녀에 대한 육아휴직기간 전부</u>를 인정한다.", wrong:"모든 자녀에 대한 전부 인정", right:"자녀당 최초 1년(셋째 이후 자녀는 전기간)", explain:"경력평정은 전부 산입되나, 호봉승급은 자녀당 최초 1년 인정(셋째 이후 전기간 인정)이다.", page:"244p" },
      { id:"7-4", q:"육아휴직수당은 시작일부터 3개월까지는 월봉급액 상한 <u>200만원</u>을 지급한다.", wrong:"200만원", right:"250만원", explain:"육아휴직수당은 시작일부터 3개월까지 상한 250만원, 4~6개월은 상한 200만원이다.", page:"245p" },
      { id:"7-5", q:"육아휴직수당은 육아휴직 시작일부터 7개월째 이후에는 월봉급액의 <u>70퍼센트</u>(상한 160만원)를 지급한다.", wrong:"70퍼센트", right:"80퍼센트", explain:"육아휴직수당은 7개월째 이후부터 월봉급액의 80퍼센트(상한 160만원)를 지급한다.", page:"245p" },
      { id:"7-6", q:"육아휴직 결원보충의 경우, 출산휴가와 연계된 육아휴직기간이 합산하여 <u>1월</u> 이상이면 결원보충이 가능하다.", wrong:"1월", right:"3월", explain:"출산휴가와 연계 시 합산 3월 이상이면 결원보충이 가능하다.", page:"194p" },
      { id:"7-7", q:"첫째 자녀 육아휴직에 이어 둘째 자녀에 대한 휴직을 하고자 할 때에는 <u>별도의 복직 없이 연장 신청</u>을 하면 된다.", wrong:"별도의 복직 없이 연장 신청", right:"첫째에 대하여 복직 신청하고 동시에 둘째에 대하여 휴직 신청", explain:"각각의 자녀에 대한 복직 및 휴직을 허가받아야 하며, 그렇지 않으면 첫째 자녀 휴직의 연장으로 간주된다.", page:"242p" },
      { id:"7-8", q:"쌍생아 출산의 경우 각각의 자녀에 대해 <u>2년</u>씩, 최대 <u>4년</u>간의 휴직기간 전부를 경력으로 인정받을 수 있다.", wrong:"2년씩, 최대 4년", right:"3년씩, 최대 6년", explain:"쌍생아의 경우 각각의 자녀에 대해 3년씩, 최대 6년간의 휴직기간 전부를 경력으로 인정받을 수 있다.", page:"248p" },
      { id:"7-9", q:"현재 육아휴직 중인 경우에도 둘째 아이 출산 시 <u>출산휴가를 신청할 수 있다</u>.", wrong:"출산휴가를 신청할 수 있다", right:"출산휴가 사용 불가(복직 후 신청)", explain:"육아휴직 상태에서는 출산휴가를 사용할 수 없으며, 첫째 자녀에 대해 복직 후 출산휴가를 신청해야 한다.", page:"248p" },
      { id:"7-10", q:"명절휴가비는 지급기준일(설날, 추석) 현재 <u>육아휴직 중인 경우에도 지급</u>된다.", wrong:"육아휴직 중인 경우에도 지급", right:"지급하지 않음", explain:"명절휴가비는 지급기준일 현재 육아휴직 중인 경우 지급하지 않는다.", page:"250p" },
      { id:"7-11", q:"육아휴직 중인 교원의 경력평정은 <u>50퍼센트</u> 산입된다.", wrong:"50퍼센트", right:"100퍼센트 산입(전부)", explain:"육아휴직 중 경력평정은 모든 자녀에 대한 전 기간을 100퍼센트 산입한다.", page:"244p" },
      { id:"7-12", q:"육아휴직 기간 중 직무연수를 받기 위해서는 반드시 <u>복직 후</u>에만 가능하다.", wrong:"복직 후에만 가능", right:"2년 이상 휴직자는 복직 전 직무연수 30시간 이수 의무", explain:"2년 이상 육아휴직자는 복직 전 30시간 내외의 직무연수를 받아야 한다.", page:"244p" },
      { id:"7-13", q:"육아휴직 1년 이상 사용 시 복직 전 직무연수 <u>30시간</u>을 이수해야 한다.", wrong:"1년 이상", right:"2년 이상", explain:"2년 이상 육아휴직 시 복직 전 직무연수 30시간 이수 의무가 발생한다.", page:"244p" },

      { id:"10-4", q:"국내연수휴직은 「고등교육법」에 의하여 설치된 대학교·대학원 외에 <u>야간 및 계절제</u> 대학원도 허용된다.", wrong:"야간 및 계절제 허용", right:"야간, 계절제는 불가", explain:"야간수업, 계절수업은 국내연수휴직 대상 교육기관에서 제외된다.", page:"260p" },
      { id:"10-5", q:"국내연수휴직 중 대학원 <u>교육과정을 수료</u>한 경우 이는 휴직사유의 소멸로 보아 즉시 복직해야 한다.", wrong:"교육과정을 수료하면 즉시 복직", right:"수료만으로는 복직 사유 아님", explain:"원래 휴직사유가 학위취득이 목적이므로 교육과정 수료만으로는 조기복직 사유에 해당되지 않는다.", page:"263p" },
      { id:"10-6", q:"국내연수휴직 시 봉급은 <u>봉급의 50퍼센트</u>를 지급한다.", wrong:"봉급의 50퍼센트", right:"지급하지 않음", explain:"국내연수휴직 시 봉급은 지급하지 않는다.", page:"263p" },
      { id:"10-7", q:"국내연수휴직으로 박사학위를 취득하지 못하고 박사과정만 수료한 경우, 경력 50퍼센트를 인정하며 <u>호봉 재획정</u>이 이루어진다.", wrong:"호봉 재획정이 이루어진다", right:"호봉 재획정 없음(학위 취득 시에만 재획정)", explain:"박사학위를 취득하지 못하면 호봉 재획정은 없으며, 박사학위를 취득한 경우에만 인정된다.", page:"264p" },
      { id:"10-8", q:"국내연수휴직은 <u>법학전문대학원(로스쿨)</u> 연수를 목적으로 한 휴직이 가능하다.", wrong:"법학전문대학원(로스쿨) 연수 가능", right:"불가", explain:"법학전문대학원 연수를 목적으로 한 국내연수휴직은 현재 가능하지 않다.", page:"263p" },
      { id:"10-9", q:"국내연수휴직 결원보충은 <u>3월</u> 이상 휴직 시 별도정원에 의한 결원보충이 가능하다.", wrong:"3월", right:"6월", explain:"국내연수휴직 결원보충은 6월 이상 휴직 시 가능하다.", page:"263p" },

      { id:"10-11", q:"국내연수휴직 중 학위를 취득한 경우 경력 인정 기간은 입학일로부터 최대 <u>5년</u>이다.", wrong:"5년", right:"3년", explain:"국내연수휴직으로 학위를 취득하면 입학일로부터 3년에 한하여 경력을 인정한다.", page:"263p" },
      { id:"10-12", q:"국내연수휴직 중 경력평정의 산입률은 <u>100퍼센트</u>이다.", wrong:"100퍼센트", right:"50퍼센트", explain:"국내연수휴직 경력평정 산입률은 50퍼센트이다.", page:"263p" },
      { id:"10-13", q:"국내연수휴직 후 복직하면 <u>즉시 승진심사에 응할 수 있다</u>.", wrong:"즉시 승진심사에 응할 수 있다", right:"경력평정 50퍼센트 산입으로 실질적 불이익이 있을 수 있음", explain:"경력평정이 50퍼센트만 산입되므로 동기 대비 불리하게 작용할 수 있다.", page:"263p" },
      { id:"10-14", q:"국내연수휴직 기간 중 학위를 조기 취득하면 남은 기간에 <u>추가 학위 취득을 위해 연수를 계속</u>할 수 있다.", wrong:"추가 학위 취득을 위해 연수를 계속", right:"사유 소멸로 복직해야 함", explain:"학위 조기 취득은 휴직사유 소멸에 해당하므로 복직해야 한다.", page:"263p" },
      { id:"10-15", q:"국내연수휴직의 최대 기간은 연장을 포함하여 <u>6년</u>이다.", wrong:"6년", right:"3년(연장 규정 없음)", explain:"국내연수휴직은 3년 이내이며, 유학휴직과 달리 연장 규정이 없다.", page:"261p" },
      { id:"10-16", q:"국내연수휴직 기간 중 호봉승급은 <u>50퍼센트</u> 인정된다.", wrong:"50퍼센트", right:"학위취득 시에만 입학일부터 3년 한도로 인정", explain:"국내연수휴직 중 호봉승급은 학위취득 시 입학일로부터 3년 한도에서만 인정된다.", page:"264p" },

      { id:"10-28", q:"국내연수휴직 중에도 <u>교육공무원으로서 직무를 수행</u>할 의무가 있다.", wrong:"교육공무원으로서 직무를 수행", right:"직무수행 의무가 면제됨(휴직 상태)", explain:"휴직 중에는 직무수행 의무가 면제된다.", page:"261p" },

// STATE
// ══════════════════════════════════════════════
let state = {
  view: 'overview',     // 'overview' | 'section' | 'allStudy' | 'wrongStudy'
  activeSec: 0,
  studyIdx: 0,
  showAnswer: false,
  mode: 'list',         // 'list' | 'study'
  filter: 'all',        // 'all' | 'unseen' | 'wrong' | 'correct'
  answers: {},          // { qId: 'correct'|'wrong'|'skip' }
  allStudyQuestions: [], // shuffled questions for allStudy / wrongStudy
  sidebarOpen: window.innerWidth > 700, // desktop: open / mobile: closed
};

// Load saved state
try {
  const saved = JSON.parse(localStorage.getItem('quiz_state') || '{}');
  if (saved.answers) state.answers = saved.answers;
} catch(e) {}

function saveState() {
  try { localStorage.setItem('quiz_state', JSON.stringify({ answers: state.answers })); } catch(e) {}
}

function getStatus(qId) { return state.answers[qId] || 'unseen'; }

function setAnswer(qId, val) {
  state.answers[qId] = val;
  saveState();
  render();
}

function getStats() {
  const all = SECTIONS.flatMap(s => s.questions);
  const correct = all.filter(q => getStatus(q.id) === 'correct').length;
  const wrong = all.filter(q => getStatus(q.id) === 'wrong').length;
  const skip = all.filter(q => getStatus(q.id) === 'skip').length;
  const unseen = all.length - correct - wrong - skip;
  return { total: all.length, correct, wrong, skip, unseen };
}

function getSecStats(sec) {
  const correct = sec.questions.filter(q => getStatus(q.id) === 'correct').length;
  const wrong = sec.questions.filter(q => getStatus(q.id) === 'wrong').length;
  const done = correct + wrong + sec.questions.filter(q => getStatus(q.id) === 'skip').length;
  return { correct, wrong, done, total: sec.questions.length };
}

// ══════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════
function render() {
  const app = document.getElementById('app');
  const stats = getStats();
  const pct = Math.round((stats.correct + stats.skip + stats.wrong) / stats.total * 100);

  // Build HTML
  const isMobile = window.innerWidth <= 700;
  const sidebarClass = isMobile
    ? (state.sidebarOpen ? 'open-mobile' : 'collapsed')
    : (state.sidebarOpen ? '' : 'collapsed');

  let html = `
    <div class="sidebar-backdrop ${state.sidebarOpen && isMobile ? 'visible' : ''}" onclick="toggleSidebar()"></div>
    <div class="app-header">
      <button class="sidebar-toggle-btn" onclick="toggleSidebar()" title="메뉴 열기/닫기">${state.sidebarOpen ? '✕' : '☰'}</button>
      <div class="header-icon">📖</div>
      <div>
        <div class="header-title">휴직과 복직 — 틀린 부분 찾기</div>
        <div class="header-sub">교육공무원 인사실무 매뉴얼 제4장 · 14절 420문항</div>
      </div>
      <div class="header-right">
        <div class="score-badge">✅ ${stats.correct} / ${stats.total}</div>
        <button class="reset-btn" onclick="resetAll()">초기화</button>
      </div>
    </div>
    <div class="global-progress">
      <div class="global-progress-fill" style="width:${pct}%"></div>
    </div>
    <div class="app-body">
      <nav class="sidebar ${sidebarClass}" id="app-sidebar">
        <div class="sidebar-label">전체 절</div>
        <button class="section-btn ${state.view==='overview'?'active':''}" onclick="goOverview()">🏠 전체 개요</button>
  `;

  SECTIONS.forEach((sec, idx) => {
    const ss = getSecStats(sec);
    const isDone = ss.done === ss.total;
    html += `<button class="section-btn ${state.view==='section'&&state.activeSec===idx?'active':''}" onclick="goSection(${idx})">
      제${sec.id}절 ${sec.title}
      <span class="sec-progress ${isDone?'done':''}">${ss.correct}/${ss.total}</span>
    </button>`;
  });

  const wrongTotal = SECTIONS.flatMap(s=>s.questions).filter(q=>getStatus(q.id)==='wrong').length;
  html += `
    <div class="sidebar-label" style="margin-top:14px;">특별 학습</div>
    <button class="section-btn ${state.view==='allStudy'?'active':''}" onclick="goAllStudy()" style="${state.view!=='allStudy'?'color:#fdd475;':''}">
      🔀 전체 무작위
      <span class="sec-progress">420</span>
    </button>
    <button class="section-btn ${state.view==='wrongStudy'?'active':''}" onclick="goWrongStudy()" style="${state.view!=='wrongStudy'?'color:#ff8a80;':''}">
      ❌ 오답 반복
      <span class="sec-progress">${wrongTotal}</span>
    </button>
  `;

  html += `</nav><div class="main" id="main-content">`;

  if (state.view === 'overview') {
    html += renderOverview(stats);
  } else if (state.view === 'section') {
    html += renderSection();
  } else if (state.view === 'allStudy' || state.view === 'wrongStudy') {
    html += renderAllStudyMode();
  }

  html += `</div></div>`;
  app.innerHTML = html;
}

function renderOverview(stats) {
  const pct = Math.round(stats.correct / stats.total * 100);
  let html = `
    <div class="overview">
      <h2>📚 학습 현황</h2>
      <p>각 절을 클릭하여 학습을 시작하세요. 밑줄 친 부분의 오류를 찾아보세요!</p>
      <div class="summary-bar">
        <div class="sum-item"><div class="sum-num col-total">${stats.total}</div><div class="sum-lbl">전체 문항</div></div>
        <div class="sum-item"><div class="sum-num col-correct">${stats.correct}</div><div class="sum-lbl">✅ 정답</div></div>
        <div class="sum-item"><div class="sum-num col-wrong">${stats.wrong}</div><div class="sum-lbl">❌ 오답</div></div>
        <div class="sum-item"><div class="sum-num col-unseen">${stats.unseen}</div><div class="sum-lbl">💤 미학습</div></div>
      </div>
      <div style="height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden;margin-bottom:20px;">
        <div style="height:100%;background:linear-gradient(90deg,#00897b,#4caf50);width:${pct}%;border-radius:5px;transition:width 0.5s;"></div>
      </div>
      <div class="section-grid">
  `;

  SECTIONS.forEach((sec, idx) => {
    const ss = getSecStats(sec);
    const pct2 = Math.round(ss.correct / ss.total * 100);
    html += `
      <div class="sec-tile" onclick="goSection(${idx})">
        <div class="sec-tile-num">제${sec.id}절</div>
        <div class="sec-tile-name">${sec.title}</div>
        <div class="tile-bar"><div class="tile-bar-fill" style="width:${pct2}%"></div></div>
        <div class="tile-stat">✅ ${ss.correct} / ${ss.total} (오답 ${ss.wrong})</div>
      </div>
    `;
  });

  html += `</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-top:24px;">
      <button class="start-all-btn" onclick="goSection(0)" style="background:var(--navy);">🚀 제1절부터 시작</button>
      <button class="start-all-btn" onclick="goAllStudy()" style="background:var(--blue);">🔀 전체 무작위 학습</button>
      <button class="start-all-btn" onclick="goWrongStudy()" style="background:${stats.wrong>0?'var(--red)':'#aaa'};">❌ 오답만 반복 (${stats.wrong})</button>
    </div>
  </div>`;
  return html;
}

function renderSection() {
  const sec = SECTIONS[state.activeSec];
  const ss = getSecStats(sec);
  const circ = 64;
  const r = 27;
  const circumference = 2 * Math.PI * r;
  const offset = circumference - (ss.correct / ss.total) * circumference;

  let qs = sec.questions;
  if (state.filter === 'unseen') qs = qs.filter(q => getStatus(q.id) === 'unseen');
  if (state.filter === 'wrong') qs = qs.filter(q => getStatus(q.id) === 'wrong');
  if (state.filter === 'correct') qs = qs.filter(q => getStatus(q.id) === 'correct');

  let html = `
    <div class="section-header">
      <div class="sec-num">${sec.id}</div>
      <div>
        <div class="sec-title-text">제${sec.id}절 ${sec.title}</div>
        <div class="sec-meta">30문항 · ${ss.correct}문항 정답 · ${ss.wrong}문항 오답</div>
      </div>
      <div class="sec-stats">
        <div class="progress-ring">
          <svg width="${circ}" height="${circ}" viewBox="0 0 ${circ} ${circ}">
            <circle class="ring-bg" cx="32" cy="32" r="${r}" stroke-dasharray="${circumference}"/>
            <circle class="ring-fill" cx="32" cy="32" r="${r}" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
          </svg>
          <div class="ring-label">${Math.round(ss.correct/ss.total*100)}%</div>
        </div>
      </div>
    </div>

    <div class="mode-tabs">
      <button class="mode-tab ${state.mode==='list'?'active':''}" onclick="setMode('list')">📋 목록 모드</button>
      <button class="mode-tab ${state.mode==='study'?'active':''}" onclick="setMode('study')">🎯 학습 모드</button>
    </div>
  `;

  if (state.mode === 'list') {
    html += `
      <div class="controls">
        <button class="ctrl-btn ${state.filter==='all'?'active':''}" onclick="setFilter('all')">전체 (${sec.questions.length})</button>
        <button class="ctrl-btn ${state.filter==='unseen'?'active':''}" onclick="setFilter('unseen')">미학습 (${sec.questions.filter(q=>getStatus(q.id)==='unseen').length})</button>
        <button class="ctrl-btn ${state.filter==='wrong'?'active':''}" onclick="setFilter('wrong')">오답 (${sec.questions.filter(q=>getStatus(q.id)==='wrong').length})</button>
        <button class="ctrl-btn ${state.filter==='correct'?'active':''}" onclick="setFilter('correct')">정답 (${sec.questions.filter(q=>getStatus(q.id)==='correct').length})</button>
        <span class="filter-label">${qs.length}문항 표시</span>
      </div>
    `;

    if (qs.length === 0) {
      html += `<div style="text-align:center;padding:40px;color:var(--muted);font-size:17px;">해당하는 문항이 없습니다 🎉</div>`;
    } else {
      qs.forEach((q, localIdx) => {
        const status = getStatus(q.id);
        const cardClass = status === 'correct' ? 'answered-correct' : status === 'wrong' ? 'answered-wrong' : status === 'skip' ? 'answered-skip' : '';
        const statusIcon = status === 'correct' ? '✅' : status === 'wrong' ? '❌' : status === 'skip' ? '⏭' : '';
        const showAns = state.showAnswer === q.id;

        html += `
          <div class="q-card ${cardClass}" id="qcard-${q.id}">
            <div class="q-header">
              <div class="q-num-badge">Q${sec.questions.indexOf(q)+1}</div>
              <div style="flex:1"></div>
              ${statusIcon ? `<div class="q-status-icon">${statusIcon}</div>` : ''}
              <div class="q-page">${q.page}</div>
            </div>
            <div class="q-body">${q.q}</div>
            <div class="q-actions">
        `;

        if (!showAns) {
          html += `<button class="ans-btn btn-reveal" onclick="showAns('${q.id}')">🔍 정답 확인</button>`;
        }

        if (showAns) {
          html += `
            <button class="ans-btn btn-correct" onclick="markAnswer('${q.id}','correct')">✅ 맞혔어요</button>
            <button class="ans-btn btn-wrong" onclick="markAnswer('${q.id}','wrong')">❌ 틀렸어요</button>
            <button class="ans-btn btn-skip" onclick="markAnswer('${q.id}','skip')">⏭ 건너뜀</button>
          `;
        }

        if (status !== 'unseen') {
          html += `<button class="ans-btn btn-reset-q" onclick="resetQ('${q.id}')">↺ 초기화</button>`;
        }

        html += `</div>`;

        if (showAns) {
          html += `
            <div class="answer-box">
              <div class="answer-wrong-part">
                <span class="ans-label">오류</span>
                <span class="ans-wrong-text">❌ "${q.wrong}"</span>
                <span class="ans-arrow">→</span>
                <span class="ans-right-text">✅ "${q.right}"</span>
              </div>
              <div class="explain-box">
                <div class="explain-label">💡 해설</div>
                ${q.explain}
              </div>
            </div>
          `;
        }

        html += `</div>`;
      });
    }

    // Section navigation
    html += `<div class="q-nav">
      <button class="nav-btn" onclick="prevSec()" ${state.activeSec===0?'disabled':''}>← 이전 절</button>
      <span style="font-size:13px;color:var(--muted)">제${sec.id}절 / 전체 14절</span>
      <button class="nav-btn" onclick="nextSec()" ${state.activeSec===SECTIONS.length-1?'disabled':''}>다음 절 →</button>
    </div>`;

  } else {
    // STUDY MODE
    html += renderStudyMode(sec);
  }

  return html;
}

function renderStudyMode(sec) {
  const qs = sec.questions;
  const idx = Math.min(state.studyIdx, qs.length - 1);
  const q = qs[idx];
  const status = getStatus(q.id);
  const statusIcon = status === 'correct' ? '✅' : status === 'wrong' ? '❌' : status === 'skip' ? '⏭' : '💤';
  const cardBorder = status === 'correct' ? 'var(--green)' : status === 'wrong' ? 'var(--red)' : 'var(--border)';

  let html = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:15px;color:var(--muted);">문항 ${idx+1} / ${qs.length}</span>
      <span style="font-size:22px;">${statusIcon}</span>
      <span style="font-size:13px;color:var(--muted);">${q.page}</span>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:20px;">
  `;

  qs.forEach((qq, i) => {
    const s = getStatus(qq.id);
    const col = s==='correct'?'var(--green)':s==='wrong'?'var(--red)':s==='skip'?'#ccc':'#ddd';
    html += `<div style="flex:1;height:5px;background:${col};border-radius:3px;cursor:pointer;${i===idx?'box-shadow:0 0 0 2px var(--navy);':''}" onclick="goStudyIdx(${i})"></div>`;
  });

  html += `</div>
    <div class="study-card" style="border-color:${cardBorder};${!state.showAnswer?'cursor:pointer;':''}" ${!state.showAnswer?'onclick="toggleStudyAnswer()"':''}>
      ${!state.showAnswer ? `<div style="position:absolute;top:14px;right:18px;font-size:12px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:6px;">👆 클릭하면 정답 확인</div>` : ''}
      <div class="study-q-body" style="position:relative;">${q.q}</div>

      ${!state.showAnswer ? '' : `
        <div class="answer-box" style="border-radius:12px;overflow:hidden;margin-bottom:16px;">
          <div class="answer-wrong-part">
            <span class="ans-label">오류</span>
            <span class="ans-wrong-text">❌ "${q.wrong}"</span>
            <span class="ans-arrow">→</span>
            <span class="ans-right-text">✅ "${q.right}"</span>
          </div>
          <div class="explain-box">
            <div class="explain-label">💡 해설</div>
            ${q.explain}
          </div>
        </div>
        <div class="study-actions">
          <button class="ans-btn btn-correct" onclick="event.stopPropagation();studyMark('correct')">✅ 맞혔어요</button>
          <button class="ans-btn btn-wrong" onclick="event.stopPropagation();studyMark('wrong')">❌ 틀렸어요</button>
          <button class="ans-btn btn-skip" onclick="event.stopPropagation();studyMark('skip')">⏭ 건너뜀</button>
        </div>
      `}
    </div>
    <div class="q-nav">
      <button class="nav-btn" onclick="studyPrev()" ${idx===0?'disabled':''}>← 이전 문항</button>
      <button class="nav-btn" onclick="studyNext()" ${idx===qs.length-1?'disabled':''}>다음 문항 →</button>
    </div>
    <div class="q-nav" style="margin-top:10px;">
      <button class="nav-btn" onclick="prevSec()" ${state.activeSec===0?'disabled':''}>← 이전 절</button>
      <button class="nav-btn" onclick="nextSec()" ${state.activeSec===SECTIONS.length-1?'disabled':''}>다음 절 →</button>
    </div>
  `;
  return html;
}

function renderAllStudyMode() {
  const qs = state.allStudyQuestions;
  if (qs.length === 0) {
    const isWrong = state.view === 'wrongStudy';
    return `<div style="text-align:center;padding:60px 20px;">
      <div style="font-size:48px;margin-bottom:16px;">${isWrong ? '🎉' : '❓'}</div>
      <div style="font-size:20px;font-weight:700;color:var(--navy);margin-bottom:8px;">${isWrong ? '오답이 없습니다!' : '문제가 없습니다'}</div>
      <div style="font-size:15px;color:var(--muted);">${isWrong ? '모든 문제를 맞혔어요. 정말 훌륭합니다! 🏆' : ''}</div>
      <button class="nav-btn" style="margin-top:24px;padding:12px 28px;" onclick="goOverview()">← 전체 개요로</button>
    </div>`;
  }
  const idx = Math.min(state.studyIdx, qs.length - 1);
  const q = qs[idx];
  const status = getStatus(q.id);
  const statusIcon = status === 'correct' ? '✅' : status === 'wrong' ? '❌' : status === 'skip' ? '⏭' : '💤';
  const cardBorder = status === 'correct' ? 'var(--green)' : status === 'wrong' ? 'var(--red)' : 'var(--border)';
  const isWrong = state.view === 'wrongStudy';
  const secId = q.id.split('-')[0];
  const secTitle = SECTIONS.find(s => s.id == secId)?.title || '';

  let html = `
    <div class="section-header" style="margin-bottom:20px;">
      <div class="sec-num">${isWrong ? '❌' : '🔀'}</div>
      <div>
        <div class="sec-title-text">${isWrong ? '오답 반복 학습' : '전체 문제 (무작위)'}</div>
        <div class="sec-meta">${qs.length}문항 · ${qs.filter(q=>getStatus(q.id)==='correct').length}정답 · ${qs.filter(q=>getStatus(q.id)==='wrong').length}오답</div>
      </div>
      <div style="margin-left:auto;">
        <button class="nav-btn" onclick="${isWrong ? 'goWrongStudy()' : 'goAllStudy()'}">🔄 다시 섞기</button>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <span style="font-size:15px;color:var(--muted);">문항 ${idx+1} / ${qs.length}</span>
      <span style="font-size:13px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:6px;">제${secId}절 ${secTitle} · ${q.page}</span>
      <span style="font-size:22px;">${statusIcon}</span>
    </div>

    <div style="display:flex;gap:3px;margin-bottom:20px;">
  `;

  // Progress dots (max 30 shown for readability)
  const shown = qs.length <= 50 ? qs : qs.slice(Math.max(0,idx-15), Math.min(qs.length, idx+15+1));
  const startOffset = qs.length <= 50 ? 0 : Math.max(0,idx-15);
  shown.forEach((qq, i) => {
    const realIdx = startOffset + i;
    const s = getStatus(qq.id);
    const col = s==='correct'?'var(--green)':s==='wrong'?'var(--red)':s==='skip'?'#ccc':'#ddd';
    html += `<div style="flex:1;height:5px;background:${col};border-radius:3px;cursor:pointer;${realIdx===idx?'box-shadow:0 0 0 2px var(--navy);':''}" onclick="goStudyIdx(${realIdx})"></div>`;
  });

  html += `</div>
    <div class="study-card" style="border-color:${cardBorder};position:relative;${!state.showAnswer?'cursor:pointer;':''}" ${!state.showAnswer?'onclick="toggleStudyAnswer()"':''}>
      ${!state.showAnswer ? `<div style="position:absolute;top:14px;right:18px;font-size:12px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:6px;">👆 클릭하면 정답 확인</div>` : ''}
      <div class="study-q-body">${q.q}</div>

      ${!state.showAnswer ? '' : `
        <div class="answer-box" style="border-radius:12px;overflow:hidden;margin-bottom:16px;">
          <div class="answer-wrong-part">
            <span class="ans-label">오류</span>
            <span class="ans-wrong-text">❌ "${q.wrong}"</span>
            <span class="ans-arrow">→</span>
            <span class="ans-right-text">✅ "${q.right}"</span>
          </div>
          <div class="explain-box">
            <div class="explain-label">💡 해설</div>
            ${q.explain}
          </div>
        </div>
        <div class="study-actions">
          <button class="ans-btn btn-correct" onclick="event.stopPropagation();allStudyMark('correct')">✅ 맞혔어요</button>
          <button class="ans-btn btn-wrong" onclick="event.stopPropagation();allStudyMark('wrong')">❌ 틀렸어요</button>
          <button class="ans-btn btn-skip" onclick="event.stopPropagation();allStudyMark('skip')">⏭ 건너뜀</button>
        </div>
      `}
    </div>
    <div class="q-nav" style="margin-top:12px;">
      <button class="nav-btn" onclick="allStudyPrev()" ${idx===0?'disabled':''}>← 이전 문항</button>
      <button class="nav-btn" onclick="goOverview()">🏠 개요로</button>
      <button class="nav-btn" onclick="allStudyNext()" ${idx===qs.length-1?'disabled':''}>다음 문항 →</button>
    </div>
  `;

  // Completion message at last question
  if (idx === qs.length - 1 && state.showAnswer) {
    const doneCount = qs.filter(q => getStatus(q.id) !== 'unseen').length;
    html += `<div style="text-align:center;padding:24px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;margin-top:16px;">
      <div style="font-size:32px;margin-bottom:8px;">🏁</div>
      <div style="font-size:18px;font-weight:700;color:var(--navy);margin-bottom:8px;">마지막 문항입니다!</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:16px;">총 ${qs.length}문항 중 ${doneCount}문항 완료</div>
      <button class="nav-btn" onclick="${isWrong ? 'goWrongStudy()' : 'goAllStudy()'}" style="padding:10px 24px;">🔄 처음부터 다시</button>
    </div>`;
  }

  return html;
}

// ══════════════════════════════════════════════
// ACTIONS (exposed to onclick)
// ══════════════════════════════════════════════
function toggleSidebar() { state.sidebarOpen = !state.sidebarOpen; render(); }
function goOverview() {
  state.view = 'overview';
  if (window.innerWidth <= 700) state.sidebarOpen = false;
  render();
}
function goSection(idx) {
  state.view = 'section'; state.activeSec = idx; state.showAnswer = false; state.studyIdx = 0;
  if (window.innerWidth <= 700) state.sidebarOpen = false;
  render(); scrollMainTop();
}
function prevSec() { if (state.activeSec > 0) { state.activeSec--; state.studyIdx = 0; state.showAnswer = false; render(); scrollMainTop(); } }
function nextSec() { if (state.activeSec < SECTIONS.length-1) { state.activeSec++; state.studyIdx = 0; state.showAnswer = false; render(); scrollMainTop(); } }
function setMode(m) { state.mode = m; state.showAnswer = false; state.studyIdx = 0; render(); }
function setFilter(f) { state.filter = f; state.showAnswer = false; render(); }
function showAns(qId) { state.showAnswer = qId; render(); }
function markAnswer(qId, val) { setAnswer(qId, val); state.showAnswer = false; }
function resetQ(qId) { delete state.answers[qId]; saveState(); render(); }
function resetAll() { if (confirm('모든 학습 기록을 초기화하시겠습니까?')) { state.answers = {}; saveState(); render(); } }
function goStudyIdx(i) { state.studyIdx = i; state.showAnswer = false; render(); }
function toggleStudyAnswer() { state.showAnswer = !state.showAnswer; render(); }

function studyMark(val) {
  const sec = SECTIONS[state.activeSec];
  const q = sec.questions[Math.min(state.studyIdx, sec.questions.length-1)];
  state.answers[q.id] = val;
  saveState();
  state.showAnswer = false;
  if (state.studyIdx < sec.questions.length - 1) {
    state.studyIdx++;
  }
  render();
}

function studyPrev() { if (state.studyIdx > 0) { state.studyIdx--; state.showAnswer = false; render(); } }
function studyNext() { if (state.studyIdx < SECTIONS[state.activeSec].questions.length-1) { state.studyIdx++; state.showAnswer = false; render(); } }

// ── All Study / Wrong Study ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function goAllStudy() {
  const all = SECTIONS.flatMap(s => s.questions);
  state.allStudyQuestions = shuffle(all);
  state.view = 'allStudy';
  state.studyIdx = 0;
  state.showAnswer = false;
  if (window.innerWidth <= 700) state.sidebarOpen = false;
  render();
  scrollMainTop();
}

function goWrongStudy() {
  const wrong = SECTIONS.flatMap(s => s.questions).filter(q => getStatus(q.id) === 'wrong');
  state.allStudyQuestions = shuffle(wrong);
  state.view = 'wrongStudy';
  state.studyIdx = 0;
  state.showAnswer = false;
  if (window.innerWidth <= 700) state.sidebarOpen = false;
  render();
  scrollMainTop();
}

function allStudyMark(val) {
  const qs = state.allStudyQuestions;
  if (qs.length === 0) return;
  const q = qs[Math.min(state.studyIdx, qs.length - 1)];
  state.answers[q.id] = val;
  saveState();
  state.showAnswer = false;
  if (state.studyIdx < qs.length - 1) {
    state.studyIdx++;
  }
  render();
}

function allStudyPrev() { if (state.studyIdx > 0) { state.studyIdx--; state.showAnswer = false; render(); } }
function allStudyNext() { if (state.studyIdx < state.allStudyQuestions.length - 1) { state.studyIdx++; state.showAnswer = false; render(); } }

function scrollMainTop() { setTimeout(() => { const m = document.getElementById('main-content'); if (m) m.scrollIntoView({behavior:'smooth', block:'start'}); }, 50); }

// ── Init ──
render();
</script>
</body>
</html>
